<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة LSPD الموحدة</title>
    <style>
        :root { --primary: #0b141a; --secondary: #112233; --accent: #1e3d59; --gold: #e1b12c; --text: #f5f6fa; }
        body { font-family: sans-serif; background-color: #080c10; color: var(--text); margin: 0; }
        .nav-tabs { display: flex; background-color: var(--primary); padding: 10px; gap: 5px; border-bottom: 2px solid var(--gold); }
        .nav-btn { background: var(--secondary); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        .nav-btn.active { background: var(--accent); }
        .container { padding: 20px; }
        .card { background: #111a24; padding: 20px; border-radius: 8px; border: 1px solid #1b2a47; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #1b2a47; padding: 10px; text-align: center; }
        th { color: var(--gold); }
    </style>
</head>
<body>
    <div class="nav-tabs">
        <button class="nav-btn active">المركبات والأعطال</button>
    </div>
    <div class="container">
        <div class="card">
            <h2>صلاحيات المركبات العسكرية</h2>
            <table>
                <thead><tr><th>الرتبة</th><th>المركبات</th></tr></thead>
                <tbody>
                    <tr><td>Officer I / Cadet</td><td>Ford Victoria / Police Explorer</td></tr>
                    <tr><td>Officer III</td><td>Police Tesla / Police Durango</td></tr>
                </tbody>
            </table>
        </div>
        <div class="card">
            <h2>شروط الخروج الآمن</h2>
            <ul>
                <li>التدخل الخارجي يبيح فتح النار فوراً.</li>
                <li>دخول الورشة أثناء المطاردة يلغي الخروج الآمن.</li>
            </ul>
        </div>
    </div>
</body>
</html>
